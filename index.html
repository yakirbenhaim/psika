<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>מאגר פסקי דין –  </title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;
  --blue:#2563eb;--blue-light:#dbeafe;
  --amber:#d97706;--amber-light:#fef3c7;
  --green:#059669;--green-light:#d1fae5;
  --red:#dc2626;--red-light:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;
  --gray-700:#374151;--gray-900:#111827;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --r:8px;--r-sm:4px;--r-lg:14px
}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh;direction:rtl}

/* ── HEADER ── */
.hdr{background:var(--navy);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md);position:sticky;top:0;z-index:100}
.hdr-title{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px}
.hdr-title svg{flex-shrink:0}
.ro-badge{background:rgba(251,191,36,.25);color:#fcd34d;border:1px solid rgba(251,191,36,.4);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}

/* ── LAYOUT ── */
.app-body{display:flex;max-width:1380px;margin:0 auto;padding:20px;gap:18px;min-height:calc(100vh - 60px)}

/* ── SIDEBAR ── */
.sidebar{width:250px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}.btn-secondary:hover{background:rgba(255,255,255,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.sb-card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:10px}
.filter-list{display:flex;flex-direction:column;gap:2px}
.fo{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;transition:background .1s;font-size:13px;user-select:none}
.fo:hover{background:var(--gray-50)}
.fo.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.fc{font-size:11px;background:var(--gray-100);color:var(--gray-500);padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
.fo.active .fc{background:var(--blue);color:#fff}
.date-pair{display:flex;flex-direction:column;gap:8px}
.date-pair label{font-size:11px;color:var(--gray-500)}
.fc-inp{padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-size:14px;font-family:inherit;direction:rtl;background:#fff;width:100%}
.fc-inp:focus{outline:none;border-color:var(--blue)}
.btn-clr{display:block;width:100%;padding:8px;background:transparent;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;font-family:inherit;text-align:center}
.btn-clr:hover{background:var(--gray-100)}

/* ── MAIN ── */
.main{flex:1;min-width:0}
.search-wrap{position:relative;margin-bottom:14px}
.search-inp{width:100%;padding:11px 16px 11px 44px;border:2px solid var(--gray-200);border-radius:var(--r);font-size:15px;font-family:inherit;direction:rtl;transition:border-color .15s;background:#fff}
.search-inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none}
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stats-txt{font-size:13px;color:var(--gray-500)}
.sort-sel{padding:6px 10px;border:1px solid var(--gray-200);border-radius:var(--r-sm);font-size:13px;font-family:inherit;background:#fff;direction:rtl}

/* ── VERDICT CARDS ── */
.vlist{display:flex;flex-direction:column;gap:10px}
.vcard{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r);padding:16px 20px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.vcard:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.vcard-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.vcard-ref{font-weight:800;font-size:16px;color:var(--navy);white-space:nowrap}
.vcard-parties{font-size:14px;color:var(--gray-700);font-weight:500;margin-top:2px}
.vcard-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.vcard-date{font-size:12px;color:var(--gray-400);margin-top:4px}
.principle-strip{background:var(--amber-light);border-right:3px solid var(--amber);padding:8px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:13px;color:var(--gray-700);margin-top:10px;font-style:italic;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.summary-preview{font-size:13px;color:var(--gray-500);line-height:1.6;margin-top:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.offense-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}
.badge-navy{background:#e0e7ff;color:var(--navy)}
.badge-purple{background:#ede9fe;color:#7c3aed}

/* ── LEGISLATION CARD ── */
.vcard.legislation-card{border-right:4px solid #7c3aed}
.vcard.legislation-card .vcard-ref{color:#7c3aed}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px;color:var(--gray-500)}
.empty .eico{font-size:52px;margin-bottom:16px}
.empty h3{font-size:18px;color:var(--gray-600);margin-bottom:8px}
.empty p{font-size:14px}
.loading-bar{height:3px;background:linear-gradient(90deg,var(--blue),#60a5fa,var(--blue));background-size:200%;animation:loadAnim 1.2s linear infinite;border-radius:2px;margin-bottom:16px}
@keyframes loadAnim{0%{background-position:200%}100%{background-position:-200%}}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:800px;box-shadow:var(--shadow-lg);animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--gray-200);position:sticky;top:0;background:#fff;border-radius:var(--r-lg) var(--r-lg) 0 0;z-index:1}
.modal-title{font-size:18px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:var(--r-sm);color:var(--gray-400);font-size:18px;line-height:1;transition:all .1s}.modal-close:hover{background:var(--gray-100);color:var(--gray-700)}
.modal-body{padding:22px 24px;max-height:calc(100vh - 200px);overflow-y:auto}
.modal-ftr{display:flex;align-items:center;gap:8px;padding:14px 24px;border-top:1px solid var(--gray-200);background:var(--gray-50);border-radius:0 0 var(--r-lg) var(--r-lg)}
.btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200);display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;border:1px solid var(--gray-200)}.btn-ghost:hover{background:var(--gray-100)}

/* ── DETAIL VIEW ── */
.det-ref{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:2px}
.det-parties{font-size:16px;color:var(--gray-700);font-weight:500;margin-bottom:14px}
.det-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--gray-100)}
.det-sec{margin-bottom:20px}
.det-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--gray-400);margin-bottom:8px}
.det-principle{background:var(--amber-light);border-right:4px solid var(--amber);padding:14px 16px;border-radius:0 var(--r) var(--r) 0;font-size:15px;color:var(--gray-800);line-height:1.75;font-weight:500}
.det-summary{font-size:14px;line-height:1.9;color:var(--gray-700);white-space:pre-wrap}

mark{background:#fef08a;padding:1px 0;border-radius:2px}
mark.hl-search{background:#fb923c;color:#000}
mark.hl-user{background:#fef08a}

/* ── MOBILE ── */
.mob-filter-btn{display:none;align-items:center;gap:6px;background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--r);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray-700);font-family:inherit;width:100%}
.mob-filter-btn.active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}

@media(max-width:768px){
  .hdr{padding:0 14px;height:54px}
  .hdr-title{font-size:15px}
  .hdr-title svg{width:22px;height:22px}
  .hdr-title span.hdr-sub{display:none}
  .app-body{flex-direction:column;padding:10px;gap:10px}
  .sidebar{width:100%;display:none;flex-direction:column;gap:8px}
  .sidebar.mob-open{display:flex}
  .mob-filter-btn{display:flex}
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:var(--r-lg) var(--r-lg) 0 0;max-width:100%;max-height:92vh}
  .modal-body{max-height:calc(92vh - 130px)}
  .search-inp,.fc-inp{font-size:16px}
  .vcard{padding:12px 14px}
  .vcard-ref{font-size:14px}
  .det-ref{font-size:19px}
}
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay" style="position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;max-width:360px;width:calc(100% - 32px);text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4)">
    <div style="font-size:52px;margin-bottom:14px">🔐</div>
    <h2 style="color:var(--navy);margin-bottom:6px;font-size:20px">כניסה למאגר פסקי דין</h2>
    <p style="color:var(--gray-500);font-size:13px;margin-bottom:22px">הזן את המספר האישי שלך</p>
    <input type="password" id="auth-id-inp" class="fc-inp"
      placeholder="מספר אישי"
      style="text-align:center;font-size:20px;letter-spacing:6px;margin-bottom:10px;direction:ltr"
      inputmode="numeric"
      onkeydown="if(event.key==='Enter')verifyPassword()">
    <div id="auth-error" style="color:#ef4444;font-size:13px;margin-bottom:10px;min-height:20px;line-height:1.4"></div>
    <button id="auth-submit-btn" onclick="verifyPassword()" style="width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">כניסה</button>
    <button id="auth-retry-btn" onclick="location.reload()" style="display:none;width:100%;margin-top:8px;padding:10px;background:transparent;color:var(--gray-500);border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;cursor:pointer;font-family:inherit">🔄 רענן דף</button>
  </div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-title">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M3 12h18M3 18h18"/><circle cx="12" cy="12" r="10" stroke="#60a5fa"/>
    </svg>
    מאגר פסקי דין
    <span class="hdr-sub" style="font-size:13px;font-weight:400;opacity:.6;margin-right:4px"> </span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="user-info" style="display:none;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.85)">
      <span>👮 <span id="user-name-display"></span></span>
      <button onclick="logout()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:var(--r-sm);padding:3px 10px;font-size:12px;cursor:pointer;font-family:inherit">התנתק</button>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="refreshData(this)">🔄 רענן</button>
    <button class="btn btn-secondary btn-sm" onclick="filterDocs()">📄 מסמכים</button>
    <span class="ro-badge">צפייה בלבד</span>
  </div>
</header>

<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-card">
      <div class="sb-title">סוג רשומה</div>
      <div class="filter-list" id="fl-type"></div>
    </div>
    <div class="sb-card">
      <div class="sb-title">תגיות</div>
      <div class="filter-list" id="fl-tags"></div>
    </div>
    <div class="sb-card">
      <div class="sb-title">סימון</div>
      <div class="filter-list" id="fl-flag"></div>
    </div>
    <div class="sb-card">
      <div class="sb-title">טווח תאריכים</div>
      <div class="date-pair">
        <div><label>מתאריך</label><input type="date" class="fc-inp" id="df-from" style="margin-top:4px" oninput="render()"></div>
        <div><label>עד תאריך</label><input type="date" class="fc-inp" id="df-to" style="margin-top:4px" oninput="render()"></div>
      </div>
    </div>
    <button class="btn-clr" onclick="clearFilters()">נקה סינון</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <button class="mob-filter-btn" id="mob-filter-btn" onclick="toggleMobFilters()">☰ סינון ופילטרים</button>
    <div class="search-wrap">
      <svg class="search-ico" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" class="search-inp" id="search-inp"
        placeholder="חפש לפי מספר תיק, שם צד, עיקרון משפטי, עבירה..."
        oninput="render()">
    </div>
    <div class="stats-bar">
      <span class="stats-txt" id="stats-txt"></span>
      <select class="sort-sel" id="sort-sel" onchange="render()">
        <option value="date-desc">תאריך – מהחדש לישן</option>
        <option value="date-asc">תאריך – מהישן לחדש</option>
        <option value="added-desc">נוסף לאחרונה</option>
      </select>
    </div>
    <div class="vlist" id="vlist">
      <div class="empty">
        <div class="loading-bar"></div>
        <p style="color:var(--gray-400)">טוען פסקי דין...</p>
      </div>
    </div>
  </main>
</div>

<!-- DETAIL MODAL -->
<div id="m-detail" class="overlay" style="display:none" onclick="if(event.target.id==='m-detail')closeDetail()">
<div class="modal" onclick="event.stopPropagation()">
  <div class="modal-hdr">
    <span class="modal-title">פרטי פסק דין</span>
    <button class="modal-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="modal-body" id="detail-body"></div>
  <div class="modal-ftr">
    <button class="btn-ghost" onclick="closeDetail()">סגור</button>
  </div>
</div>
</div>

<script>
const CLOUDINARY_CLOUD_NAME = 'dzl1bc17o';
let DB = [];
let activeF = { tag: null, flag: null, type: null };

// ── HELPERS ────────────────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hl(text, q) {
  const t = esc(text);
  if (!q) return t;
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return t.replace(new RegExp(`(${e})`, 'gi'), '<mark class="hl-search">$1</mark>');
}
function renderMd(str) {
  if (!str) return '';
  let s = esc(str);
  s = s.replace(/\*\*(.*?)\*\*/gs, '<strong>$1</strong>');
  s = s.replace(/==(.*?)==/g, '<mark class="hl-user">$1</mark>');
  return s;
}
function hlInHtml(html, q) {
  if (!q || !html) return html || '';
  const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${e})`, 'gi');
  return html.split(/(<[^>]+>)/).map(p => p.startsWith('<') ? p : p.replace(re, '<mark class="hl-search">$1</mark>')).join('');
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${parseInt(d)}.${parseInt(m)}.${y}`;
}
function caseType(ref) {
  if (!ref) return '';
  for (const t of ['רע"פ','בש"פ','בשפ','ע"פ','עמ"ת','מ"ת','ב"ש','ת"פ','עצ']) {
    if (ref.startsWith(t) || ref.indexOf(t) === 0) return t;
  }
  return (ref.match(/^[\u05D0-\u05FA"״']+/) || [''])[0];
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function counts(field) {
  const c = {};
  DB.forEach(v => {
    const val = v[field];
    if (Array.isArray(val)) val.forEach(s => { if(s) c[s]=(c[s]||0)+1; });
    else if (val) c[val]=(c[val]||0)+1;
  });
  return c;
}
function renderSidebar() {
  const typeMap = { 'verdict': 0, 'info': 0, 'legislation': 0 };
  DB.forEach(v => { typeMap[v.type||'verdict'] = (typeMap[v.type||'verdict']||0)+1; });
  buildFL('fl-type', typeMap, 'type', { 'verdict': 'פסקי דין', 'info': 'מידע', 'legislation': 'חקיקה' });
  buildFL('fl-tags', counts('tags'), 'tag');
  const flagMap = {};
  DB.filter(v => v.type === 'verdict').forEach(v => { if(v.flag) flagMap[v.flag]=(flagMap[v.flag]||0)+1; });
  buildFL('fl-flag', flagMap, 'flag', { anchor: '📌 חשוב', danger: '⚠️ סנגוריאלי' });
}
function buildFL(elId, map, key, valMap) {
  const el = document.getElementById(elId);
  const cur = activeF[key];
  let h = foItem(null,'הכל',DB.length,key,cur);
  if (valMap) {
    Object.entries(valMap).forEach(([rawVal,label]) => {
      const cnt = map[rawVal] || 0;
      if (cnt || rawVal === 'verdict' || rawVal === 'info' || rawVal === 'legislation') h += foItem(rawVal,label,cnt,key,cur);
    });
  } else {
    Object.entries(map).forEach(([k,v]) => h += foItem(k,k,v,key,cur));
  }
  el.innerHTML = h;
  el.querySelectorAll('.fo').forEach(e => {
    e.addEventListener('click', () => { activeF[key] = e.dataset.val||null; render(); });
  });
}
function foItem(val, label, cnt, key, cur) {
  const active = (val===cur)||(!val&&!cur) ? 'active':'';
  const dv = val ? `data-val="${esc(val)}"` : '';
  return `<div class="fo ${active}" ${dv}><span>${label}</span><span class="fc">${cnt}</span></div>`;
}

// ── SEARCH & RENDER ────────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('search-inp').value.toLowerCase().trim();
  const df = document.getElementById('df-from').value;
  const dt = document.getElementById('df-to').value;
  const sort = document.getElementById('sort-sel').value;
  let list = DB.filter(v => {
    if (q) {
      const corpus = [v.ref,v.parties,v.summary,v.principle,...(v.offenseTypes||[]),...(v.tags||[]),v.court].join(' ').toLowerCase();
      if (!corpus.includes(q)) return false;
    }
    if (activeF.type && v.type!==activeF.type) return false;
    if (activeF.tag && !(v.tags||[]).includes(activeF.tag)) return false;
    if (activeF.flag && v.flag!==activeF.flag) return false;
    if (df && v.date && v.date<df) return false;
    if (dt && v.date && v.date>dt) return false;
    return true;
  });
  list.sort((a,b) => {
    if (sort==='date-desc') return (b.date||'').localeCompare(a.date||'');
    if (sort==='date-asc')  return (a.date||'').localeCompare(b.date||'');
    return (b.createdAt||0)-(a.createdAt||0);
  });
  return list;
}

function loadLocalFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      DB = JSON.parse(e.target.result);
      render();
    } catch {
      alert('קובץ JSON שגוי');
    }
  };
  reader.readAsText(file, 'utf-8');
}

// ── AUTH HELPERS ──────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function fetchFromCloudinary(publicId) {
  const url = `https://res.cloudinary.com/${CLOUDINARY_CLOUD_NAME}/raw/upload/${publicId}.json?t=${Date.now()}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`שגיאה (${r.status})`);
  return r.json();
}

let _cachedUsers = null;

function showApp(name) {
  document.getElementById('auth-overlay').style.display = 'none';
  if (name) {
    document.getElementById('user-name-display').textContent = name;
    document.getElementById('user-info').style.display = 'flex';
  }
}

function showAuthOverlay(users) {
  _cachedUsers = users;
  // overlay is already visible — just ensure the login input is focused
  setTimeout(() => document.getElementById('auth-id-inp')?.focus(), 100);
}

async function verifyPassword() {
  const id = document.getElementById('auth-id-inp').value.trim();
  const errEl = document.getElementById('auth-error');
  if (!id) return;
  const hash = await sha256(id);
  const match = (_cachedUsers || []).find(u => u.hash === hash);
  if (match) {
    localStorage.setItem('auth_token', hash);
    localStorage.setItem('user_name', match.name);
    errEl.textContent = '';
    showApp(match.name);
    await loadVerdicts();
  } else {
    errEl.textContent = '❌ מספר אישי שגוי';
    document.getElementById('auth-id-inp').value = '';
    document.getElementById('auth-id-inp').focus();
    setTimeout(() => errEl.textContent = '', 3000);
  }
}

function logout() {
  localStorage.removeItem('auth_token');
  localStorage.removeItem('user_name');
  location.reload();
}

async function refreshData(btn) {
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  await loadVerdicts();
  if (btn) { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '🔄 רענן'; btn.disabled = false; }, 1500); }
}

async function loadVerdicts() {
  try {
    DB = await fetchFromCloudinary('verdicts_db');
    render();
  } catch(e) {
    document.getElementById('vlist').innerHTML = `
      <div class="empty">
        <div class="eico">⚠️</div>
        <h3>שגיאה בטעינת הנתונים</h3>
        <p>לא ניתן לטעון את מסד הנתונים מהענן.<br>אנא פנה למנהל המערכת.</p>
        <button onclick="loadVerdicts()" style="margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:14px">נסה שנית</button>
      </div>`;
  }
}

function showOverlayError(msg) {
  document.getElementById('auth-error').textContent = msg;
  document.getElementById('auth-id-inp').style.display = 'none';
  document.getElementById('auth-submit-btn').style.display = 'none';
  document.getElementById('auth-retry-btn').style.display = 'block';
}

async function init() {
  const token = localStorage.getItem('auth_token');

  // טוען רשימת משתמשים מCloudinary
  let users = null;
  try {
    users = await fetchFromCloudinary('users_db');
  } catch(e) {
    // נכשל — אם יש token שמור ננסה לאמת אותו בכניסה הבאה
    // אך אם אין — נציג שגיאת חיבור ולא נאפשר כניסה
    if (!token) {
      showOverlayError('⚠️ שגיאת חיבור — לא ניתן לטעון רשימת המשתמשים. נסה לרענן את הדף.');
      return;
    }
    // יש token אבל לא הצלחנו לאמת — הצג שגיאה
    showOverlayError('⚠️ שגיאת חיבור — לא ניתן לאמת. נסה לרענן את הדף.');
    return;
  }

  // אין משתמשים מוגדרים כלל — גישה חופשית
  if (!users || users.length === 0) {
    showApp('');
    await loadVerdicts();
    return;
  }

  // יש משתמשים — בדוק token שמור
  if (token) {
    const valid = users.some(u => u.hash === token);
    if (valid) {
      const name = localStorage.getItem('user_name') || '';
      showApp(name);
      await loadVerdicts();
      return;
    }
    // token לא תקף — נקה
    localStorage.removeItem('auth_token');
    localStorage.removeItem('user_name');
  }

  // הצג מסך כניסה
  showAuthOverlay(users);
}

init();
